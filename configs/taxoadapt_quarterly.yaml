defaults:
  allowed_scope: core_domain
  init_levels: 1
  max_depth: 3
  max_density: 40
  max_children_per_node: 5
  bootstrap_paper_sample_size: 20
  width_paper_sample_size: 40
  depth_paper_sample_size: 40
  candidate_label_top_k: 20
  min_candidate_votes: 2
  workers: 6
  request_timeout: 240
  max_retries: 2
  min_abstract_chars: 40
  temperature_bootstrap: 0.1
  temperature_routing: 0.0
  temperature_classification: 0.0
  temperature_expansion: 0.4
  temperature_clustering: 0.2
  dimensions:
  - id: tasks
    display_name: Tasks
    definition: 'Problem settings or objectives addressed by the paper, including
      concrete tasks, goals, operating settings, and benchmark problem formulations.

      '
  - id: methodologies
    display_name: Methodologies
    definition: 'Techniques, model families, algorithms, architectural patterns, retrieval
      pipelines, agent loops, training recipes, or optimization strategies proposed
      or emphasized by the paper.

      '
  - id: datasets
    display_name: Datasets
    definition: 'Datasets, benchmarks, evaluation suites, corpora, structured resources,
      or data-construction artifacts introduced or substantially curated by the paper.

      '
  - id: evaluation_methods
    display_name: Evaluation Methods
    definition: 'Evaluation protocols, metrics, benchmark methodologies, stress tests,
      ablation frameworks, or analysis methods used to assess research systems.

      '
  - id: real_world_domains
    display_name: Real-World Domains
    definition: 'Applied settings, user populations, industries, scientific domains,
      enterprise contexts, or operational environments in which the research is deployed
      or evaluated.

      '
  time_slices:
  - slice_id: 2023Q1
    start: '2023-01-01'
    end: '2023-04-01'
  - slice_id: 2023Q2
    start: '2023-04-01'
    end: '2023-07-01'
  - slice_id: 2023Q3
    start: '2023-07-01'
    end: '2023-10-01'
  - slice_id: 2023Q4
    start: '2023-10-01'
    end: '2024-01-01'
  - slice_id: 2024Q1
    start: '2024-01-01'
    end: '2024-04-01'
  - slice_id: 2024Q2
    start: '2024-04-01'
    end: '2024-07-01'
  - slice_id: 2024Q3
    start: '2024-07-01'
    end: '2024-10-01'
  - slice_id: 2024Q4
    start: '2024-10-01'
    end: '2025-01-01'
  - slice_id: 2025Q1
    start: '2025-01-01'
    end: '2025-04-01'
  - slice_id: 2025Q2
    start: '2025-04-01'
    end: '2025-07-01'
  - slice_id: 2025Q3
