domain_id: llm_agent
raw_inputs:
  - data/raw/paper_metadata_llm_agent.jsonl
  - data/raw/metadata.jsonl

corpus:
  merged_output: data/domains/llm_agent/interim/papers_merged.jsonl
  candidate_output: data/domains/llm_agent/interim/candidate_papers.jsonl
  summary_output: data/domains/llm_agent/interim/corpus_summary.json

annotation:
  prompt_id: curation/domain_scope_and_taxonomy
  input_path: data/domains/llm_agent/interim/candidate_papers.jsonl
  output_path: data/domains/llm_agent/annotations/paper_labels.jsonl
  error_path: data/domains/llm_agent/annotations/paper_labels.errors.jsonl
  request_timeout: 240
  temperature: 0.0
  workers: 8
  max_retries: 2
  candidate_tier: core_candidate
  prompt_static:
    domain_name: LLM Agent
    domain_summary: >
      A benchmark domain centered on large-language-model agents, including
      autonomous agents, tool-using agents, multi-agent systems, agent memory,
      planning, reflection, environment interaction, and agent evaluation.
    core_definition: >
      论文的核心贡献直接面向 LLM agent 或 agentic system 本身，包括单智能体、
      多智能体、工具使用、规划推理、记忆机制、环境交互、agent benchmark、
      以及以 agent 能力提升为中心的方法和评测。
    adjacent_definition: >
      与 agent 方向相关，但 agent 不是论文核心对象，例如一般性的 reasoning、
      safety、robotics、tool use、workflow orchestration、或者只是把 agent
      当成一个应用场景。
    out_of_scope_definition: >
      不以 LLM agent 为核心研究对象，例如纯 prompt engineering、纯模型预训练、
      纯 NLP 任务、纯机器人控制、纯系统部署或评测，而没有清晰的 agent 方法学贡献。
    boundary_rules: |
      优先纳入：
      - general-purpose LLM agents
      - tool-using agents and function-calling agents
      - planning, decomposition, reasoning, and reflection for agent systems
      - memory mechanisms for agents
      - multi-agent coordination and communication
      - web, code, embodied, or environment-interacting agents when the agent loop is central
      - agent benchmarks, failure analysis, and reliability studies focused on agent behavior
      - scientific research agents and software engineering agents when the agent methodology is central

      倾向判为 adjacent：
      - general LLM reasoning papers without an explicit agent loop
      - robotics or embodied control papers where LLM agents are only a wrapper
      - workflow or orchestration systems without agent methodology contributions
      - safety or evaluation papers where agents appear only as a testbed

      排除：
      - pure prompt engineering without agent architecture
      - pure base-model pretraining or scaling work
      - pure NLP task papers without an agentic system
      - deployment or serving systems without agent research contribution

clean:
  output_path: data/domains/llm_agent/clean/core_papers.jsonl
  stats_output: data/domains/llm_agent/clean/core_stats.json
