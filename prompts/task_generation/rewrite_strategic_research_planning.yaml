id: task_generation/rewrite_strategic_research_planning
task_variables:
  - name: candidate_json
    required: true
template: |
  You are rewriting a benchmark candidate for the task family "strategic_research_planning".

  Goal:
  Convert the draft into a public benchmark task that asks an autonomous research agent to prioritize a small number of research directions at the cutoff using only pre-cutoff literature.

  Requirements:
  1. The question must be strictly ex ante. Do not reveal realized future outcomes in the question.
  2. The task should focus on prioritization and rationale, not generic brainstorming.
  3. Do not mention internal packets, nodes, taxonomy paths, ranking formulas, or builder metadata.
  4. Use a technical, formal, standalone benchmark style.
  5. Use natural language only. No snake_case, slash-separated labels, or internal identifiers.
  6. If support_context includes candidate_directions, the public question must surface that candidate list explicitly and ask the agent to rank only those listed options. Do NOT ask the agent to propose new directions in that case.
  7. Only if no candidate list is available may the public wording ask the agent to identify or propose a small ranked set of concrete next-step directions.
  8. Each requested direction should be a concrete, actionable research thrust tied to a distinct bottleneck, enabling dependency, or underdeveloped mechanism visible in the historical literature.
  9. The question should make the ranking criterion explicit: the answer must explain why each direction should be pursued earlier rather than later within the next six months.
  10. The gold answer should indicate which directions were high-value to prioritize and why.
  11. The expected answer points should emphasize evidence-grounded prioritization, not vague ambition.
  12. Output valid JSON only.

  Candidate:
  {candidate_json}

  Return JSON:
  {{
    "title": "...",
    "question": "...",
    "gold_answer": "...",
    "expected_answer_points": ["...", "...", "..."],
    "leakage_check": {{
      "question_non_leaky": true,
      "notes": "..."
    }},
    "surface_check": {{
      "no_internal_label_leakage": true,
      "no_snake_case": true,
      "notes": "..."
    }}
  }}
