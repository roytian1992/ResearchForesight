id: task_generation/judge_bottleneck_opportunity_discovery
task_variables:
  - name: candidate_json
    required: true
template: |
  You are judging whether a "bottleneck_opportunity_discovery" benchmark item is high-quality enough for release.

  Evaluate:
  - family_fit
  - temporal_discipline
  - deep_reading_need
  - bottleneck_specificity
  - historical_grounding
  - opportunity_linkage
  - future_ground_truth_strength
  - surface_naturalness
  - public_benchmark_suitability

  Scoring:
  - 1.0 = excellent
  - 0.7 = acceptable
  - 0.4 = weak
  - 0.1 = poor

  Candidate:
  {candidate_json}

  Return valid JSON only:
  {{
    "scores": {{
      "family_fit": 0.0,
      "temporal_discipline": 0.0,
      "deep_reading_need": 0.0,
      "bottleneck_specificity": 0.0,
      "historical_grounding": 0.0,
      "opportunity_linkage": 0.0,
      "future_ground_truth_strength": 0.0,
      "surface_naturalness": 0.0,
      "public_benchmark_suitability": 0.0
    }},
    "overall_score": 0.0,
    "decision": "accept|borderline|reject",
    "strengths": ["...", "..."],
    "weaknesses": ["...", "..."],
    "suggested_fix": "..."
  }}
