id: task_generation/judge_candidate_generic
task_variables:
  - name: candidate_json
    required: true
template: |
  You are judging whether a benchmark candidate is high-quality enough for release.

  Evaluate the candidate on:
  - task_family_fit
  - non_leakiness
  - historical_evidence_sufficiency
  - future_ground_truth_strength
  - specificity_and_insight
  - clarity
  - surface_naturalness
  - public_benchmark_suitability

  Scoring:
  - 1.0 = excellent
  - 0.7 = acceptable
  - 0.4 = weak
  - 0.1 = poor

  Candidate:
  {candidate_json}

  Return valid JSON only:
  {{
    "scores": {{
      "task_family_fit": 0.0,
      "non_leakiness": 0.0,
      "historical_evidence_sufficiency": 0.0,
      "future_ground_truth_strength": 0.0,
      "specificity_and_insight": 0.0,
      "clarity": 0.0,
      "surface_naturalness": 0.0,
      "public_benchmark_suitability": 0.0
    }},
    "overall_score": 0.0,
    "decision": "accept|borderline|reject",
    "strengths": ["...", "..."],
    "weaknesses": ["...", "..."],
    "suggested_fix": "..."
  }}
