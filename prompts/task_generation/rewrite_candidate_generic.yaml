id: task_generation/rewrite_candidate_generic
task_variables:
  - name: candidate_json
    required: true
template: |
  You are rewriting a benchmark candidate into a formal research-benchmark task.

  Requirements:
  1. Keep the task strictly non-leaky: do not mention future-only facts in the question.
  2. Use a technical, formal style.
  3. The question must be answerable from the provided historical evidence packet.
  4. The gold answer should summarize the realized future outcome concisely and concretely.
  5. Keep wording domain-specific, not generic.
  6. Do not expose internal build artifacts such as node, packet, lineage, taxonomy path, split pressure, or descendant IDs.
  7. Do not use snake_case, slash-separated labels, or internal taxonomy identifiers anywhere in the output.
  8. Convert topic names and future themes into natural-language research phrases.
  9. The question should read like a real benchmark task shown to an autonomous research agent.
  10. Use ex ante wording in the question.
  11. Do not mention support packets or builder-facing inputs in the question.
  12. Output valid JSON only.

  Candidate:
  {candidate_json}

  Return JSON:
  {{
    "title": "...",
    "question": "...",
    "gold_answer": "...",
    "expected_answer_points": ["...", "...", "..."],
    "leakage_check": {{"question_non_leaky": true, "notes": "..."}},
    "surface_check": {{"no_internal_label_leakage": true, "no_snake_case": true, "notes": "..."}}
  }}
