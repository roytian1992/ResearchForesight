id: paper_scope_and_taxonomy
category: curation
name: Paper Scope And Taxonomy
description: >
  Determine whether a paper is truly in scope for the LLM Agent benchmark and
  assign multi-dimensional taxonomy labels with concise evidence.

task_variables:
  - name: paper_id
    type: string
    required: true
    description: Paper identifier.
  - name: title
    type: string
    required: true
    description: Paper title.
  - name: abstract
    type: string
    required: true
    description: Paper abstract.
  - name: categories
    type: string
    required: true
    description: Subject categories as a comma-separated string.
  - name: published
    type: string
    required: false
    description: Published timestamp.

static_variables:
  - name: taxonomy_guide
    type: string
    required: true
    description: Human-readable taxonomy definitions.

template: |
  你正在为一个“LLM Agent 科研趋势预测 benchmark”筛选论文并打标签。

  你的任务不是判断论文是否“和 LLM 有一点关系”，而是判断它是否应进入
  这个 benchmark 的核心语料。核心标准是：
  - 论文确实研究了 LLM agent、agentic workflow、tool-using LLM systems、multi-agent systems、
    agent memory / planning / interaction、agent benchmark，或者与这些主题强相关的 agent 方法与评测。
  - 如果论文只是一般性的 LLM、纯 NLP、纯多模态、纯安全、纯 RL、纯机器人控制，而“agent”不是核心对象，
    应判为 `adjacent` 或 `out_of_scope`。

  论文信息：
  - paper_id: {paper_id}
  - title: {title}
  - categories: {categories}
  - published: {published}

  abstract:
  {abstract}

  taxonomy guide:
  {taxonomy_guide}

  请输出一个 JSON 对象，不要输出 Markdown，不要输出解释性前缀。

  JSON 结构必须严格为：
  {{
    "paper_id": "字符串",
    "scope_decision": "core_agent | adjacent | out_of_scope",
    "confidence": 0.0,
    "reasoning": "用 2-4 句中文解释为什么这样判断",
    "evidence_phrases": ["来自标题或摘要的短语", "短语"],
    "taxonomy": {{
      "task_settings": ["标签id"],
      "method_modules": ["标签id"],
      "interaction_modes": ["标签id"],
      "evaluation_focus": ["标签id"],
      "reliability_safety": ["标签id"]
    }}
  }}

  约束：
  - `paper_id` 必须原样返回。
  - `confidence` 取值范围为 0 到 1。
  - 只能使用 taxonomy guide 中出现的标签 id。
  - 若 `scope_decision` 为 `out_of_scope`，taxonomy 仍可留空数组。
  - 若 `scope_decision` 为 `core_agent`，至少填写 1 个 `task_settings` 和 1 个 `method_modules`。
  - `evidence_phrases` 必须是论文标题或摘要中能找到的短语，不要编造。
