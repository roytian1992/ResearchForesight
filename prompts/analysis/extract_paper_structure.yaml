id: extract_paper_structure
category: analysis
name: Extract Paper Structure
description: >
  Extract technical problem, limitations, ideas, experiment signals, and
  falsification cues from a paper summary.

task_variables:
  - name: paper_id
    type: string
    required: true
    description: Paper identifier.
  - name: title
    type: string
    required: true
    description: Paper title.
  - name: abstract
    type: string
    required: true
    description: Paper abstract.
  - name: taxonomy
    type: string
    required: true
    description: Taxonomy labels.
  - name: categories
    type: string
    required: true
    description: arXiv categories.

static_variables: []

template: |
  You are extracting structured technical signals for a scientific benchmark.

  Paper metadata:
  - paper_id: {paper_id}
  - title: {title}
  - categories: {categories}
  - taxonomy: {taxonomy}

  abstract:
  {abstract}

  Use only the title and abstract. Do not invent experiments, mechanisms, or future work
  that are not supported by the given text.
  Output exactly one JSON object and nothing else.

  The JSON schema must be:
  {{
    "paper_id": "string",
    "problem_statement": "1-3 sentence English summary of the core technical problem",
    "explicit_limitations": [
      {{
        "name": "string",
        "description": "string",
        "evidence_phrases": ["short quote from title or abstract"],
        "evidence_refs": []
      }}
    ],
    "core_ideas": [
      {{
        "name": "string",
        "mechanism": "string",
        "target_limitations": ["string"],
        "evidence_phrases": ["short quote from title or abstract"],
        "evidence_refs": []
      }}
    ],
    "experiment_signals": [
      {{
        "setting": "string",
        "metrics": ["string"],
        "baselines": ["string"],
        "claim": "string",
        "evidence_phrases": ["short quote from title or abstract"],
        "evidence_refs": []
      }}
    ],
    "falsification_signals": [
      {{
        "hypothesis": "string",
        "critical_failure_mode": "string",
        "decisive_test": "string",
        "evidence_phrases": ["short quote from title or abstract"],
        "evidence_refs": []
      }}
    ],
    "future_work": [
      {{
        "direction": "string",
        "evidence_phrases": ["short quote from title or abstract"],
        "evidence_refs": []
      }}
    ]
  }}

  Constraints:
  - Return `paper_id` exactly as given.
  - Use English for every free-text field.
  - If the abstract does not clearly state a limitation, experiment, or future work direction,
    return an empty array for that field.
  - `evidence_phrases` must be copied or tightly paraphrased from the title or abstract.
  - Keep the focus on concrete technical limitations, mechanisms, experiments, and failure modes.
